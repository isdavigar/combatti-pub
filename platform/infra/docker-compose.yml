name: combatti-platform

# Healthcheck reutilizable: comprueba que el puerto del servicio acepta conexiones
# (bash /dev/tcp esta disponible en la imagen Ubuntu de eclipse-temurin).
x-svc-healthcheck: &svc-healthcheck
  test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/$${SERVER_PORT}' || exit 1"]
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 60s

services:
  postgres:
    image: postgres:16-alpine
    container_name: combatti-postgres
    environment:
      POSTGRES_DB: combatti
      POSTGRES_USER: combatti
      POSTGRES_PASSWORD: combatti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U combatti -d combatti"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: combatti-auth
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
      JWT_EXPIRATION_SECONDS: 86400
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck: *svc-healthcheck

  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    container_name: combatti-catalog
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck: *svc-healthcheck

  orders-service:
    build:
      context: ..
      dockerfile: services/orders-service/Dockerfile
    container_name: combatti-orders
    environment:
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck: *svc-healthcheck

  payments-service:
    build:
      context: ..
      dockerfile: services/payments-service/Dockerfile
    container_name: combatti-payments
    environment:
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
      ORDERS_SERVICE_URI: http://orders-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8084:8084"
    healthcheck: *svc-healthcheck

  cash-service:
    build:
      context: ..
      dockerfile: services/cash-service/Dockerfile
    container_name: combatti-cash
    environment:
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8085"
    healthcheck: *svc-healthcheck

  reporting-service:
    build:
      context: ..
      dockerfile: services/reporting-service/Dockerfile
    container_name: combatti-reporting
    environment:
      SERVER_PORT: 8086
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8086"
    healthcheck: *svc-healthcheck

  pos-bridge:
    build:
      context: ..
      dockerfile: pos-bridge/Dockerfile
    container_name: combatti-pos-bridge
    environment:
      SERVER_PORT: 9100
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
      PRINTER_TYPE: ${PRINTER_TYPE:-noop}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "9100:9100"
    healthcheck: *svc-healthcheck

  settings-service:
    build:
      context: ..
      dockerfile: services/settings-service/Dockerfile
    container_name: combatti-settings
    environment:
      SERVER_PORT: 8087
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8087:8087"
    healthcheck: *svc-healthcheck

  integration-service:
    build:
      context: ..
      dockerfile: services/integration-service/Dockerfile
    container_name: combatti-integration
    environment:
      SERVER_PORT: 8088
      DB_URL: jdbc:postgresql://postgres:5432/combatti
      DB_USER: combatti
      DB_PASSWORD: combatti
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
      CATALOG_SERVICE_URI: http://catalog-service:8082
      ORDERS_SERVICE_URI: http://orders-service:8083
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    healthcheck: *svc-healthcheck

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: combatti-gateway
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URI: http://auth-service:8081
      CATALOG_SERVICE_URI: http://catalog-service:8082
      ORDERS_SERVICE_URI: http://orders-service:8083
      PAYMENTS_SERVICE_URI: http://payments-service:8084
      CASH_SERVICE_URI: http://cash-service:8085
      REPORTING_SERVICE_URI: http://reporting-service:8086
      SETTINGS_SERVICE_URI: http://settings-service:8087
      INTEGRATION_SERVICE_URI: http://integration-service:8088
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-change-me-32}
      JWT_ISSUER: combatti-auth
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
      payments-service:
        condition: service_healthy
      cash-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
      settings-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck: *svc-healthcheck

volumes:
  pgdata:
