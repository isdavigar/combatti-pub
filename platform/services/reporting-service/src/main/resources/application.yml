server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: reporting-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/combatti}
    username: ${DB_USER:combatti}
    password: ${DB_PASSWORD:combatti}
  # El reporting-service NO crea esquemas; lee los de payments y orders.
  sql:
    init:
      mode: never

combatti:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-change-me-32}
    issuer: ${JWT_ISSUER:combatti-auth}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
