name: Inspect Cloud DB (DynamoDB)

# Lee la base de datos en la nube (DynamoDB del backend serverless del POS)
# usando las credenciales AWS ya configuradas como secrets, y muestra los
# valores reales (cuadres de caja, pedidos, ventas) en el resumen del run.
#
# Requiere los secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Región de AWS de la tabla"
        required: true
        default: "us-east-1"
        type: string
      table_name:
        description: "Nombre de la tabla (vacío = detectar automáticamente)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Listar tablas DynamoDB
        run: |
          echo "## Tablas DynamoDB en ${{ github.event.inputs.region }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          aws dynamodb list-tables --region "${{ github.event.inputs.region }}" \
            --query "TableNames" --output table >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Detectar tabla del POS
        id: pick
        run: |
          REGION="${{ github.event.inputs.region }}"
          T="${{ github.event.inputs.table_name }}"
          if [ -z "$T" ]; then
            # Buscar una tabla cuyo nombre sugiera el POS.
            T=$(aws dynamodb list-tables --region "$REGION" --query "TableNames" --output text \
              | tr '\t' '\n' | grep -iE 'combatti|pos|restaurant|production|prod' | head -n1 || true)
          fi
          if [ -z "$T" ]; then
            # Si no hay match, tomar la primera tabla.
            T=$(aws dynamodb list-tables --region "$REGION" --query "TableNames[0]" --output text || true)
          fi
          echo "table=$T" >> "$GITHUB_OUTPUT"
          echo "Tabla elegida: $T"

      - name: Escanear tabla y resumir
        if: ${{ steps.pick.outputs.table != '' && steps.pick.outputs.table != 'None' }}
        run: |
          REGION="${{ github.event.inputs.region }}"
          T="${{ steps.pick.outputs.table }}"
          echo "## Contenido de la tabla: \`$T\`" >> "$GITHUB_STEP_SUMMARY"

          # Scan completo con paginación (la tabla puede tener >1MB).
          aws dynamodb scan --table-name "$T" --region "$REGION" --output json > scan.json 2>scan.err || {
            echo "Error al escanear:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"; cat scan.err >> "$GITHUB_STEP_SUMMARY"; echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }
          # Continuar paginando si hay más.
          while [ "$(jq -r '.LastEvaluatedKey // empty' scan.json)" != "" ]; do
            LEK=$(jq -c '.LastEvaluatedKey' scan.json)
            aws dynamodb scan --table-name "$T" --region "$REGION" --output json \
              --starting-token "$(echo "$LEK" | base64 -w0)" > page.json 2>/dev/null || break
            jq -s '{Items: (.[0].Items + .[1].Items), LastEvaluatedKey: .[1].LastEvaluatedKey, Count: ((.[0].Count // 0) + (.[1].Count // 0))}' scan.json page.json > merged.json && mv merged.json scan.json
          done

          echo "**Items totales:** $(jq '.Items | length' scan.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # --- Conteo por colección (PK) ---
          echo "### Items por colección (PK)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          jq -r '.Items[] | .PK.S' scan.json | sort | uniq -c | sort -rn >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # --- PEDIDOS ---
          echo "### Pedidos (colección 'orders')" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Total pedidos: $(jq '[.Items[]|select(.PK.S=="orders")]|length' scan.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "Estados:" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.Items[]|select(.PK.S=="orders")|.data.M.status.S // "sin-estado"' scan.json | sort | uniq -c >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Suma total de PAGADOS: $(jq '[.Items[]|select(.PK.S=="orders")|select(.data.M.status.S=="Pagado")|(.data.M.total.N|tonumber)]|add // 0' scan.json)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "#### Últimos 15 pedidos pagados" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          jq -r '[.Items[]|select(.PK.S=="orders")|select(.data.M.status.S=="Pagado")|{id:.SK.S, total:(.data.M.total.N // "0"), seller:(.data.M.seller.S // "-"), paidAt:(.data.M.paidAt.S // "-")}] | sort_by(.paidAt) | reverse | .[0:15][] | "\(.paidAt) | \(.seller) | $\(.total) | \(.id)"' scan.json >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "(sin pedidos pagados)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # --- CAJA / CONFIG ---
          echo "### Caja (config) e historial de cuadres" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          jq -r '.Items[] | select(.data.M.cash != null) | .data.M.cash.M | "¿Caja abierta?: \(.open.BOOL // .open.S // "?")  | abierta por: \(.openedByUser.S // .openedBy.S // "-")"' scan.json >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "(no se encontró config de caja)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cuadres (responsable | estado | ventas | cerrado):" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.Items[] | select(.data.M.cash != null) | .data.M.cash.M.history.L[]? | .M | "\(.responsible.S // "-") | \(.status.S // "-") | ventas=\(.sales.N // "0") | gastos=\(.cashExpense.N // "0") | \(.closedAt.S // "abierta")"' scan.json >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "(sin cuadres)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Scan completo subido como artefacto **dynamodb-scan**." >> "$GITHUB_STEP_SUMMARY"

      - name: Subir scan completo
        if: ${{ steps.pick.outputs.table != '' && steps.pick.outputs.table != 'None' }}
        uses: actions/upload-artifact@v4
        with:
          name: dynamodb-scan
          path: scan.json
          retention-days: 3
