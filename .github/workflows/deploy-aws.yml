name: Deploy Backend to AWS

# Despliegue del backend en AWS.
#
# Estrategia: las imágenes Docker se COMPILAN en GitHub Actions (CPU/RAM
# potentes) y se publican en Amazon ECR. La instancia EC2 solo las DESCARGA y
# ejecuta (no compila), de modo que funciona incluso en free tier (t3.micro).
#
# Requisitos (GitHub → Settings → Secrets and variables → Actions → Secrets):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción a ejecutar"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy
          - show-credentials
      region:
        description: "Región de AWS"
        required: true
        default: "us-east-1"
        type: string
      instance_type:
        description: "Tipo de instancia (auto = detecta la free-tier de tu cuenta)"
        required: true
        default: "auto"
        type: string

permissions:
  contents: read

env:
  SERVICES: >-
    auth-service catalog-service orders-service payments-service cash-service
    reporting-service settings-service integration-service pos-bridge gateway
  ECR_REPOS: >-
    combatti-auth combatti-catalog combatti-orders combatti-payments
    combatti-cash combatti-reporting combatti-settings combatti-integration
    combatti-pos-bridge combatti-gateway

jobs:
  # ---------------------------------------------------------------------------
  # 1) Compila las imágenes y las publica en ECR (solo en 'apply').
  # ---------------------------------------------------------------------------
  build:
    name: Build & push images (ECR)
    if: ${{ github.event.inputs.action == 'apply' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Crear repositorios ECR (idempotente)
        run: |
          for repo in $ECR_REPOS; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Login en ECR
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ github.event.inputs.region }}.amazonaws.com"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password --region "${{ github.event.inputs.region }}" \
            | docker login --username AWS --password-stdin "${REGISTRY}"

      - name: Compilar imágenes
        working-directory: platform/infra
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.images.yml build $SERVICES

      - name: Publicar imágenes en ECR
        working-directory: platform/infra
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.images.yml push $SERVICES

  # ---------------------------------------------------------------------------
  # 2) Terraform: crea/actualiza la infraestructura (o destruye / muestra creds).
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform (${{ github.event.inputs.action }})
    needs: build
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/infra/aws
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ github.event.inputs.region }}
      TF_VAR_region: ${{ github.event.inputs.region }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Determinar tipo de instancia (free tier)
        run: |
          REQUESTED="${{ github.event.inputs.instance_type }}"
          if [ "${REQUESTED}" != "auto" ]; then
            echo "Tipo de instancia solicitado explícitamente: ${REQUESTED}"
            echo "TF_VAR_instance_type=${REQUESTED}" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Detectando tipos de instancia free-tier de la cuenta..."
          CANDIDATES="t3.micro t2.micro t3a.micro t2.small t3.small"
          FREE_LIST=$(aws ec2 describe-instance-types \
            --filters "Name=free-tier-eligible,Values=true" \
                      "Name=processor-info.supported-architecture,Values=x86_64" \
            --query "InstanceTypes[].InstanceType" --output text 2>/dev/null || echo "")
          echo "Free-tier x86_64 elegibles: ${FREE_LIST:-<ninguno>}"
          CHOSEN=""
          for pref in $CANDIDATES; do
            for ft in $FREE_LIST; do
              if [ "$pref" = "$ft" ]; then CHOSEN="$pref"; break 2; fi
            done
          done
          if [ -z "$CHOSEN" ] && [ -n "$FREE_LIST" ]; then
            CHOSEN=$(echo "$FREE_LIST" | tr '\t' '\n' | head -n1)
          fi
          if [ -z "$CHOSEN" ]; then CHOSEN="t3.micro"; fi
          echo "::notice::Tipo de instancia elegido: ${CHOSEN}"
          echo "TF_VAR_instance_type=${CHOSEN}" >> "$GITHUB_ENV"

      - name: Preparar bucket de estado (S3)
        id: state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ github.event.inputs.region }}"
          BUCKET="combatti-tfstate-${ACCOUNT_ID}-${REGION}"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            echo "Bucket de estado ya existe: ${BUCKET}"
          else
            echo "Creando bucket de estado: ${BUCKET}"
            if [ "${REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}"
            else
              aws s3api create-bucket --bucket "${BUCKET}" --region "${REGION}" \
                --create-bucket-configuration LocationConstraint="${REGION}"
            fi
            aws s3api put-bucket-versioning --bucket "${BUCKET}" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block --bucket "${BUCKET}" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Configurar backend S3 (solo en CI)
        run: |
          cat > backend.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.state.outputs.bucket }}" \
            -backend-config="key=backend/terraform.tfstate" \
            -backend-config="region=${{ github.event.inputs.region }}"

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve -input=false

      - name: Mostrar credenciales (admin + gateway)
        if: ${{ github.event.inputs.action == 'show-credentials' }}
        run: |
          echo "### Credenciales del backend :key:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          GATEWAY_URL=$(terraform output -raw gateway_url 2>/dev/null || echo "N/D")
          ADMIN_PW=$(terraform output -raw admin_password 2>/dev/null || echo "N/D")
          echo "**Gateway URL:** \`${GATEWAY_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Usuario admin:** \`admin\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Contraseña admin:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${ADMIN_PW}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> :warning: Trata esta contraseña como secreta. Cámbiala tras el primer login." >> "$GITHUB_STEP_SUMMARY"

      - name: Mostrar URL del backend
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "### Backend desplegado en AWS :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          GATEWAY_URL=$(terraform output -raw gateway_url)
          PUBLIC_IP=$(terraform output -raw public_ip)
          echo "**Gateway URL (usar como \`BACKEND_URL\` en Cloudflare Pages):**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${GATEWAY_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**IP pública:** ${PUBLIC_IP}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "La instancia descarga las imágenes de ECR y arranca en ~3-5 min." >> "$GITHUB_STEP_SUMMARY"
          echo "Verifica con: \`curl ${GATEWAY_URL}/api/auth/health\` (debe responder UP)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Recupera la contraseña del admin corriendo este workflow con action=show-credentials." >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve -input=false
