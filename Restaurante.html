<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combatti Café - POS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#4a2c2a;--secondary:#d4a574;--bg-dark:#1a1a2e;--bg-medium:#16213e;--bg-card:#1e2a4a;--text:#e0e0e0;--text-muted:#a0a0a0;--success:#4caf50;--danger:#f44336;--warning:#ff9800;--info:#2196f3}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg-dark);color:var(--text);height:100vh;overflow:hidden}
.login-container{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,var(--bg-dark),var(--primary))}
.login-box{background:var(--bg-card);padding:40px;border-radius:16px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.login-box h1{text-align:center;color:var(--secondary);margin-bottom:24px;font-size:1.8rem}
.login-box input{width:100%;padding:12px 16px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:var(--bg-medium);color:var(--text);font-size:1rem}
.login-box button{width:100%;padding:12px;background:var(--secondary);color:var(--primary);border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;transition:opacity .3s}
.login-box button:hover{opacity:0.85}
.app-container{display:flex;height:100vh}
.sidebar{width:220px;background:var(--bg-medium);padding:20px 0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.05)}
.sidebar .logo{text-align:center;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:10px}
.sidebar .logo h2{color:var(--secondary);font-size:1.3rem}
.sidebar .logo small{color:var(--text-muted);font-size:0.75rem}
.nav-item{display:flex;align-items:center;padding:12px 24px;cursor:pointer;transition:all .2s;color:var(--text-muted);border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(212,165,116,0.1);color:var(--secondary);border-left-color:var(--secondary)}
.nav-item i{width:24px;margin-right:12px;text-align:center}
.sidebar-footer{margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,0.05)}
.sidebar-footer .user-info{font-size:0.8rem;color:var(--text-muted);margin-bottom:8px}
.sidebar-footer button{background:var(--danger);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%}
.main-content{flex:1;overflow-y:auto;padding:24px}
.section{display:none}
.section.active{display:block}
.section-title{font-size:1.5rem;font-weight:bold;margin-bottom:20px;color:var(--secondary)}
.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.table-card{background:var(--bg-card);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent}
.table-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.table-card.libre{border-color:var(--success)}
.table-card.ocupada{border-color:var(--danger)}
.table-card .table-icon{font-size:2rem;margin-bottom:8px}
.table-card.libre .table-icon{color:var(--success)}
.table-card.ocupada .table-icon{color:var(--danger)}
.table-card .table-name{font-weight:bold;margin-bottom:4px}
.table-card .table-status{font-size:0.8rem;color:var(--text-muted)}
.table-card .table-total{font-size:0.9rem;color:var(--warning);margin-top:4px;font-weight:bold}
</style>
<style>
.order-panel{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:var(--bg-medium);box-shadow:-4px 0 20px rgba(0,0,0,0.5);transition:right .3s;z-index:100;display:flex;flex-direction:column}
.order-panel.open{right:0}
.order-panel-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05)}
.order-panel-header h3{color:var(--secondary)}
.order-panel-header .close-btn{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer}
.category-filters{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.05)}
.cat-btn{padding:6px 12px;border-radius:16px;border:1px solid var(--secondary);background:transparent;color:var(--secondary);cursor:pointer;font-size:0.8rem;transition:all .2s}
.cat-btn.active,.cat-btn:hover{background:var(--secondary);color:var(--primary)}
.menu-items-grid{flex:1;overflow-y:auto;padding:12px 20px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-content:start}
.menu-item-btn{background:var(--bg-card);border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .2s}
.menu-item-btn:hover{border-color:var(--secondary);background:rgba(212,165,116,0.1)}
.menu-item-btn .item-name{font-size:0.85rem;margin-bottom:4px}
.menu-item-btn .item-price{color:var(--secondary);font-weight:bold;font-size:0.9rem}
.order-items{max-height:200px;overflow-y:auto;padding:12px 20px;border-top:1px solid rgba(255,255,255,0.05)}
.order-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.order-item .item-info{flex:1}
.order-item .item-info .name{font-size:0.85rem}
.order-item .item-info .price{font-size:0.75rem;color:var(--text-muted)}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-controls button{width:24px;height:24px;border-radius:50%;border:1px solid var(--secondary);background:transparent;color:var(--secondary);cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center}
.qty-controls span{min-width:20px;text-align:center}
.order-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.05)}
.order-total{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:bold;margin-bottom:12px}
.order-total .total-amount{color:var(--secondary)}
.order-actions{display:flex;gap:8px}
.order-actions button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:0.9rem;transition:opacity .2s}
.btn-send{background:var(--info);color:#fff}
.btn-charge{background:var(--success);color:#fff}
.btn-cancel{background:var(--danger);color:#fff}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border-radius:16px;padding:24px;width:440px;max-height:80vh;overflow-y:auto}
.modal h3{color:var(--secondary);margin-bottom:16px}
.modal-items{margin-bottom:16px;max-height:150px;overflow-y:auto}
.modal-item{display:flex;justify-content:space-between;padding:6px 0;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.modal-total{display:flex;justify-content:space-between;font-size:1.2rem;font-weight:bold;padding:12px 0;border-top:2px solid var(--secondary);margin-bottom:16px}
.payment-methods{display:flex;gap:8px;margin-bottom:16px}
.payment-btn{flex:1;padding:10px;border:2px solid rgba(255,255,255,0.1);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;text-align:center;transition:all .2s}
.payment-btn.selected{border-color:var(--secondary);background:rgba(212,165,116,0.15);color:var(--secondary)}
.cash-input{margin-bottom:16px;display:none}
.cash-input.visible{display:block}
.cash-input label{display:block;margin-bottom:6px;font-size:0.9rem;color:var(--text-muted)}
.cash-input input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text);font-size:1rem}
.change-display{background:var(--bg-medium);padding:10px;border-radius:8px;margin-top:8px;text-align:center;font-weight:bold;color:var(--success)}
.modal-actions{display:flex;gap:8px}
.modal-actions button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.btn-confirm{background:var(--success);color:#fff}
.btn-modal-cancel{background:var(--danger);color:#fff}
</style>
<style>
.delivery-container{display:flex;flex-direction:column;gap:16px}
.delivery-form{background:var(--bg-card);padding:20px;border-radius:12px;margin-bottom:16px}
.delivery-form h4{color:var(--secondary);margin-bottom:12px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row input,.form-row textarea{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text);font-size:0.9rem}
.form-row textarea{resize:none;height:60px}
.delivery-list{display:grid;gap:12px}
.delivery-card{background:var(--bg-card);border-radius:12px;padding:16px;border-left:4px solid var(--warning)}
.delivery-card.preparando{border-left-color:var(--info)}
.delivery-card.enviado{border-left-color:var(--secondary)}
.delivery-card.entregado{border-left-color:var(--success)}
.delivery-card .delivery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.delivery-card .delivery-header h4{color:var(--text)}
.delivery-card .delivery-status{padding:4px 10px;border-radius:12px;font-size:0.75rem;font-weight:bold;background:rgba(255,152,0,0.2);color:var(--warning)}
.delivery-card .delivery-status.preparando{background:rgba(33,150,243,0.2);color:var(--info)}
.delivery-card .delivery-status.enviado{background:rgba(212,165,116,0.2);color:var(--secondary)}
.delivery-card .delivery-status.entregado{background:rgba(76,175,80,0.2);color:var(--success)}
.delivery-card .delivery-info{font-size:0.85rem;color:var(--text-muted);margin-bottom:8px}
.delivery-card .delivery-actions{display:flex;gap:8px}
.delivery-card .delivery-actions button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:bold;transition:opacity .2s}
.kitchen-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.kitchen-card{background:var(--bg-card);border-radius:12px;padding:16px;border-top:4px solid var(--warning)}
.kitchen-card.preparando{border-top-color:var(--info)}
.kitchen-card.listo{border-top-color:var(--success)}
.kitchen-card .kitchen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.kitchen-card .kitchen-type{font-size:0.75rem;padding:3px 8px;border-radius:10px;background:rgba(212,165,116,0.2);color:var(--secondary)}
.kitchen-card .kitchen-items{margin-bottom:10px}
.kitchen-card .kitchen-items li{font-size:0.85rem;padding:3px 0;color:var(--text-muted);list-style:none}
.kitchen-card .kitchen-actions button{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:bold;margin-right:6px}
.caja-container{}
.caja-closed{background:var(--bg-card);border-radius:12px;padding:40px;text-align:center}
.caja-closed h3{color:var(--text-muted);margin-bottom:16px}
.caja-closed button{padding:12px 24px;background:var(--secondary);color:var(--primary);border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer}
.caja-open{}
.caja-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.caja-header h3{color:var(--success)}
.caja-header button{padding:8px 16px;background:var(--danger);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.caja-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.caja-info-card{background:var(--bg-card);border-radius:10px;padding:14px;text-align:center}
.caja-info-card .label{font-size:0.75rem;color:var(--text-muted);margin-bottom:4px}
.caja-info-card .value{font-size:1.1rem;font-weight:bold;color:var(--secondary)}
.caja-movements{background:var(--bg-card);border-radius:12px;padding:16px;margin-top:16px}
.caja-movements h4{color:var(--secondary);margin-bottom:12px}
.movement-form{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.movement-form select,.movement-form input{padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text);font-size:0.85rem}
.movement-form button{padding:8px 14px;background:var(--secondary);color:var(--primary);border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:0.85rem}
.movements-list{max-height:200px;overflow-y:auto}
.movement-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.85rem}
.movement-item.ingreso .movement-amount{color:var(--success)}
.movement-item.egreso .movement-amount{color:var(--danger)}
</style>
<style>
.menu-container{display:flex;gap:20px;height:calc(100vh - 120px)}
.menu-categories{width:250px;background:var(--bg-card);border-radius:12px;padding:16px;overflow-y:auto}
.menu-categories h4{color:var(--secondary);margin-bottom:12px}
.menu-cat-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .2s;margin-bottom:4px}
.menu-cat-item:hover,.menu-cat-item.active{background:rgba(212,165,116,0.15);color:var(--secondary)}
.menu-cat-item .delete-cat{background:none;border:none;color:var(--danger);cursor:pointer;opacity:0.6;font-size:0.8rem}
.menu-cat-item .delete-cat:hover{opacity:1}
.add-cat-form{display:flex;gap:6px;margin-top:12px}
.add-cat-form input{flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text);font-size:0.85rem}
.add-cat-form button{padding:8px 12px;background:var(--secondary);color:var(--primary);border:none;border-radius:6px;cursor:pointer}
.menu-products{flex:1;background:var(--bg-card);border-radius:12px;padding:16px;overflow-y:auto}
.menu-products h4{color:var(--secondary);margin-bottom:12px}
.product-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;background:var(--bg-medium);margin-bottom:8px}
.product-item .product-info{display:flex;gap:12px;align-items:center}
.product-item .product-name{font-size:0.9rem}
.product-item .product-price{color:var(--secondary);font-weight:bold}
.product-item .delete-prod{background:none;border:none;color:var(--danger);cursor:pointer}
.add-prod-form{display:flex;gap:8px;margin-top:12px}
.add-prod-form input{flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text);font-size:0.85rem}
.add-prod-form button{padding:8px 14px;background:var(--secondary);color:var(--primary);border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.reports-container{}
.reports-filter{display:flex;gap:12px;margin-bottom:20px;align-items:center}
.reports-filter input{padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text)}
.reports-filter button{padding:8px 16px;background:var(--secondary);color:var(--primary);border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:var(--bg-card);border-radius:10px;padding:16px;text-align:center}
.summary-card .card-value{font-size:1.4rem;font-weight:bold;color:var(--secondary);margin-bottom:4px}
.summary-card .card-label{font-size:0.8rem;color:var(--text-muted)}
.sales-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:12px;overflow:hidden}
.sales-table th{background:var(--primary);padding:12px;text-align:left;font-size:0.85rem;color:var(--secondary)}
.sales-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.85rem}
.sales-table tr:hover td{background:rgba(212,165,116,0.05)}
.open-caja-modal .form-group{margin-bottom:14px}
.open-caja-modal .form-group label{display:block;margin-bottom:6px;color:var(--text-muted);font-size:0.85rem}
.open-caja-modal .form-group input,.open-caja-modal .form-group select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--bg-medium);color:var(--text)}
</style>
</head>
<body>
<!-- Login Screen -->
<div id="loginScreen" class="login-container">
<div class="login-box">
<h1><i class="fas fa-coffee"></i> Combatti Café</h1>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Contraseña">
<button onclick="login()">Iniciar Sesión</button>
</div>
</div>

<!-- App -->
<div id="appScreen" class="app-container" style="display:none">
<div class="sidebar">
<div class="logo"><h2><i class="fas fa-coffee"></i> Combatti</h2><small>Sistema POS</small></div>
<div class="nav-item active" onclick="navigateTo('mesas')"><i class="fas fa-chair"></i><span>Mesas</span></div>
<div class="nav-item" onclick="navigateTo('delivery')"><i class="fas fa-motorcycle"></i><span>Delivery</span></div>
<div class="nav-item" onclick="navigateTo('cocina')"><i class="fas fa-fire-burner"></i><span>Cocina</span></div>
<div class="nav-item" onclick="navigateTo('caja')"><i class="fas fa-cash-register"></i><span>Caja</span></div>
<div class="nav-item" onclick="navigateTo('menu')"><i class="fas fa-book-open"></i><span>Menú</span></div>
<div class="nav-item" onclick="navigateTo('reportes')"><i class="fas fa-chart-bar"></i><span>Reportes</span></div>
<div class="sidebar-footer">
<div class="user-info" id="userEmail"></div>
<button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
</div>
</div>
<div class="main-content">
<div id="sec-mesas" class="section active">
<h2 class="section-title"><i class="fas fa-chair"></i> Mesas</h2>
<div id="tablesGrid" class="tables-grid"></div>
</div>
<div id="sec-delivery" class="section">
<h2 class="section-title"><i class="fas fa-motorcycle"></i> Delivery</h2>
<div class="delivery-container">
<div class="delivery-form">
<h4>Nueva Orden Delivery</h4>
<div class="form-row"><input type="text" id="delClient" placeholder="Nombre del cliente"><input type="tel" id="delPhone" placeholder="Teléfono"></div>
<div class="form-row"><input type="text" id="delAddress" placeholder="Dirección"></div>
<div class="form-row"><textarea id="delNotes" placeholder="Notas"></textarea></div>
<button onclick="createDelivery()" style="padding:10px 20px;background:var(--secondary);color:var(--primary);border:none;border-radius:8px;font-weight:bold;cursor:pointer">Crear Orden</button>
</div>
<div id="deliveryList" class="delivery-list"></div>
</div>
</div>
<div id="sec-cocina" class="section">
<h2 class="section-title"><i class="fas fa-fire-burner"></i> Cocina</h2>
<div id="kitchenGrid" class="kitchen-container"></div>
</div>
<div id="sec-caja" class="section">
<h2 class="section-title"><i class="fas fa-cash-register"></i> Caja</h2>
<div id="cajaContainer" class="caja-container"></div>
</div>
<div id="sec-menu" class="section">
<h2 class="section-title"><i class="fas fa-book-open"></i> Menú</h2>
<div class="menu-container">
<div class="menu-categories">
<h4>Categorías</h4>
<div id="menuCatList"></div>
<div class="add-cat-form"><input type="text" id="newCatName" placeholder="Nueva categoría"><button onclick="addCategory()"><i class="fas fa-plus"></i></button></div>
</div>
<div class="menu-products">
<h4 id="menuProdTitle">Productos</h4>
<div id="menuProdList"></div>
<div class="add-prod-form"><input type="text" id="newProdName" placeholder="Nombre"><input type="number" id="newProdPrice" placeholder="Precio" step="0.01"><button onclick="addProduct()"><i class="fas fa-plus"></i> Agregar</button></div>
</div>
</div>
</div>
<div id="sec-reportes" class="section">
<h2 class="section-title"><i class="fas fa-chart-bar"></i> Reportes</h2>
<div class="reports-container">
<div class="reports-filter"><input type="date" id="reportDate"><button onclick="filterReports()"><i class="fas fa-search"></i> Filtrar</button></div>
<div id="summaryCards" class="summary-cards"></div>
<table class="sales-table"><thead><tr><th>Hora</th><th>Tipo</th><th>Detalle</th><th>Método</th><th>Total</th></tr></thead><tbody id="salesTableBody"></tbody></table>
</div>
</div>
</div>
</div>

<!-- Order Panel -->
<div id="orderPanel" class="order-panel">
<div class="order-panel-header"><h3 id="orderPanelTitle">Orden</h3><button class="close-btn" onclick="closeOrderPanel()"><i class="fas fa-times"></i></button></div>
<div id="categoryFilters" class="category-filters"></div>
<div id="menuItemsGrid" class="menu-items-grid"></div>
<div id="orderItems" class="order-items"></div>
<div class="order-footer">
<div class="order-total"><span>Total:</span><span class="total-amount" id="orderTotal">$0.00</span></div>
<div class="order-actions">
<button class="btn-send" onclick="sendOrder()"><i class="fas fa-paper-plane"></i> Enviar</button>
<button class="btn-charge" onclick="openChargeModal()"><i class="fas fa-dollar-sign"></i> Cobrar</button>
<button class="btn-cancel" onclick="cancelOrder()"><i class="fas fa-trash"></i></button>
</div>
</div>
</div>

<!-- Charge Modal -->
<div id="chargeModal" class="modal-overlay">
<div class="modal">
<h3><i class="fas fa-dollar-sign"></i> Cobrar</h3>
<div id="chargeItems" class="modal-items"></div>
<div class="modal-total"><span>Total a cobrar:</span><span id="chargeTotal">$0.00</span></div>
<div class="payment-methods">
<div class="payment-btn selected" onclick="selectPayment('efectivo')"><i class="fas fa-money-bill"></i><div>Efectivo</div></div>
<div class="payment-btn" onclick="selectPayment('tarjeta')"><i class="fas fa-credit-card"></i><div>Tarjeta</div></div>
<div class="payment-btn" onclick="selectPayment('transferencia')"><i class="fas fa-exchange-alt"></i><div>Transferencia</div></div>
</div>
<div id="cashInputSection" class="cash-input visible">
<label>Monto recibido:</label>
<input type="number" id="cashReceived" oninput="calculateChange()" step="0.01">
<div id="changeDisplay" class="change-display" style="display:none"></div>
</div>
<div class="modal-actions"><button class="btn-confirm" onclick="confirmCharge()"><i class="fas fa-check"></i> Confirmar</button><button class="btn-modal-cancel" onclick="closeChargeModal()">Cancelar</button></div>
</div>
</div>

<!-- Open Caja Modal -->
<div id="openCajaModal" class="modal-overlay">
<div class="modal open-caja-modal">
<h3><i class="fas fa-cash-register"></i> Abrir Caja</h3>
<div class="form-group"><label>Monto Inicial (Fondo):</label><input type="number" id="cajaFondo" step="0.01" value="0"></div>
<div class="form-group"><label>Turno:</label><select id="cajaTurno"><option value="dia">Día</option><option value="noche">Noche</option></select></div>
<div class="modal-actions"><button class="btn-confirm" onclick="abrirCaja()"><i class="fas fa-lock-open"></i> Abrir</button><button class="btn-modal-cancel" onclick="closeCajaModal()">Cancelar</button></div>
</div>
</div>
<script>
let state = {
    tables: [],
    orders: [],
    menu: [],
    categories: [],
    sales: [],
    cash: {open:false,openingAmount:0,openedAt:null,closedAt:null,turno:'dia',openedBy:'',movements:[],history:[]}
};

let currentOrder = {tableId:null,type:'mesa',clientName:'',phone:'',address:'',notes:'',items:[]};
let selectedPayment = 'efectivo';
let selectedMenuCategory = null;
let selectedManageCategory = null;
let ws = null;

function saveState(){localStorage.setItem('combatti_cafe_state',JSON.stringify(state));}

function loadState(){
    try{
        const saved=JSON.parse(localStorage.getItem('combatti_cafe_state'));
        if(saved) state=saved;
    }catch(e){}
    if(!state.cash) state.cash={open:false,openingAmount:0,openedAt:null,closedAt:null,turno:'dia',openedBy:'',movements:[],history:[]};
    if(!state.tables) state.tables=[];
    if(!state.orders) state.orders=[];
    if(!state.menu) state.menu=[];
    if(!state.categories) state.categories=[];
    if(!state.sales) state.sales=[];
}

// Push entire collection to cloud
function pushCollection(collection){
    if(collection==='cash'){
        wsSend({action:'sync',type:'putConfig',payload:state.cash});
    }else{
        const items=state[collection];
        if(Array.isArray(items)){
            items.forEach(item=>wsSend({action:'sync',type:'put',collection:collection,item:item}));
        }
    }
}

function initDefaults(){
    if(state.tables.length===0){
        for(let i=1;i<=10;i++) state.tables.push({id:i,name:'Mesa '+i});
        pushCollection('tables');
    }
    if(state.categories.length===0){
        const cats=['Cafés','Tés','Bebidas Frías','Pastelería','Sándwiches','Desayunos','Postres'];
        cats.forEach((c,i)=>state.categories.push({id:Date.now()+i,name:c}));
        pushCollection('categories');
    }
    if(state.menu.length===0){
        const items=[
            {name:'Espresso',price:2.50,category:'Cafés'},{name:'Americano',price:3.00,category:'Cafés'},{name:'Cappuccino',price:3.50,category:'Cafés'},{name:'Latte',price:3.75,category:'Cafés'},{name:'Mocha',price:4.00,category:'Cafés'},
            {name:'Té Verde',price:2.50,category:'Tés'},{name:'Té Negro',price:2.50,category:'Tés'},{name:'Manzanilla',price:2.50,category:'Tés'},{name:'Chai Latte',price:3.50,category:'Tés'},{name:'Té de Frutas',price:3.00,category:'Tés'},
            {name:'Frappe Mocha',price:4.50,category:'Bebidas Frías'},{name:'Smoothie Frutas',price:4.00,category:'Bebidas Frías'},{name:'Limonada',price:3.00,category:'Bebidas Frías'},{name:'Iced Coffee',price:3.50,category:'Bebidas Frías'},{name:'Milkshake',price:4.50,category:'Bebidas Frías'},
            {name:'Croissant',price:2.50,category:'Pastelería'},{name:'Muffin',price:2.75,category:'Pastelería'},{name:'Brownie',price:3.00,category:'Pastelería'},{name:'Cookie',price:1.50,category:'Pastelería'},{name:'Danish',price:3.00,category:'Pastelería'},
            {name:'Club Sándwich',price:5.50,category:'Sándwiches'},{name:'Sándwich Pollo',price:5.00,category:'Sándwiches'},{name:'Panini Vegetal',price:4.50,category:'Sándwiches'},{name:'BLT',price:5.00,category:'Sándwiches'},{name:'Wrap',price:4.75,category:'Sándwiches'},
            {name:'Huevos Benedict',price:6.50,category:'Desayunos'},{name:'Pancakes',price:5.50,category:'Desayunos'},{name:'Avocado Toast',price:5.00,category:'Desayunos'},{name:'Omelette',price:5.50,category:'Desayunos'},{name:'Granola Bowl',price:4.50,category:'Desayunos'},
            {name:'Cheesecake',price:4.50,category:'Postres'},{name:'Tiramisú',price:4.50,category:'Postres'},{name:'Flan',price:3.50,category:'Postres'},{name:'Helado',price:3.00,category:'Postres'},{name:'Crème Brûlée',price:4.00,category:'Postres'}
        ];
        items.forEach((it,i)=>state.menu.push({id:Date.now()+i+100,name:it.name,price:it.price,category:it.category}));
        pushCollection('menu');
    }
    saveState();
}

function login(){
    const email=document.getElementById('loginEmail').value.trim();
    const pass=document.getElementById('loginPassword').value;
    if(!email||!pass){alert('Complete todos los campos');return;}
    localStorage.setItem('combatti_cafe_user',JSON.stringify({email:email}));
    showApp(email);
}

function logout(){
    localStorage.removeItem('combatti_cafe_user');
    document.getElementById('appScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
}

function showApp(email){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='flex';
    document.getElementById('userEmail').textContent=email;
    initDefaults();
    renderAll();
    connectWS();
}

function connectWS(){
    try{
        ws=new WebSocket('wss://4qf3jjqn3j.execute-api.us-east-1.amazonaws.com/production/');
        ws.onopen=function(){console.log('WS connected');syncAll();};
        ws.onmessage=function(e){
            try{
                const msg=JSON.parse(e.data);
                // Config (cash state) from cloud
                if(msg.type==='config'&&msg.payload){
                    state.cash=msg.payload;
                    saveState();renderAll();
                    return;
                }
                if(msg.type==='configChange'&&msg.payload){
                    state.cash=msg.payload;
                    saveState();renderAll();
                    return;
                }
                // Collection snapshot from cloud - CLOUD IS TRUTH
                if(msg.type==='snapshot'&&msg.collection){
                    const items=(msg.items||[]).map(i=>typeof i==='string'?JSON.parse(i):i).filter(Boolean);
                    if(items.length>0&&state[msg.collection]!==undefined){
                        state[msg.collection]=items;
                        saveState();renderAll();
                    }
                    return;
                }
                // Single item update from cloud
                if(msg.type==='update'&&msg.collection&&msg.item){
                    if(Array.isArray(state[msg.collection])){
                        const idx=state[msg.collection].findIndex(x=>x.id===msg.item.id);
                        if(idx>=0) state[msg.collection][idx]=msg.item;
                        else state[msg.collection].push(msg.item);
                        saveState();renderAll();
                    }
                    return;
                }
                // Item deleted from cloud
                if(msg.type==='delete'&&msg.collection&&msg.docId){
                    if(Array.isArray(state[msg.collection])){
                        state[msg.collection]=state[msg.collection].filter(x=>x.id!==msg.docId);
                        saveState();renderAll();
                    }
                    return;
                }
            }catch(err){}
        };
        ws.onclose=function(){setTimeout(connectWS,5000);};
        ws.onerror=function(){};
    }catch(e){}
}

function wsSend(data){try{if(ws&&ws.readyState===1) ws.send(JSON.stringify(data));}catch(e){}}
function syncAll(){
    // Request all data from cloud - cloud is source of truth
    wsSend({action:'sync',type:'getConfig'});
    wsSend({action:'sync',type:'getAll',collection:'tables'});
    wsSend({action:'sync',type:'getAll',collection:'orders'});
    wsSend({action:'sync',type:'getAll',collection:'sales'});
    wsSend({action:'sync',type:'getAll',collection:'menu'});
    wsSend({action:'sync',type:'getAll',collection:'categories'});
}

function renderAll(){renderMesas();renderDelivery();renderKitchen();renderCaja();renderMenu();renderReports();}

function navigateTo(section){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('sec-'+section).classList.add('active');
    event.currentTarget.classList.add('active');
}

function renderMesas(){
    const grid=document.getElementById('tablesGrid');
    grid.innerHTML='';
    state.tables.forEach(t=>{
        const order=state.orders.find(o=>o.tableId===t.id&&o.type==='mesa'&&o.status!=='completado');
        const occupied=!!order;
        const total=order?order.items.reduce((s,i)=>s+i.price*i.qty,0):0;
        grid.innerHTML+=`<div class="table-card ${occupied?'ocupada':'libre'}" onclick="openTableOrder(${t.id})">
            <div class="table-icon"><i class="fas fa-chair"></i></div>
            <div class="table-name">${t.name}</div>
            <div class="table-status">${occupied?'Ocupada':'Libre'}</div>
            ${occupied?`<div class="table-total">$${total.toFixed(2)}</div>`:''}
        </div>`;
    });
}

function openTableOrder(tableId){
    const existing=state.orders.find(o=>o.tableId===tableId&&o.type==='mesa'&&o.status!=='completado');
    if(existing){
        currentOrder={tableId:tableId,type:'mesa',clientName:'',phone:'',address:'',notes:'',items:[...existing.items],orderId:existing.id};
    }else{
        currentOrder={tableId:tableId,type:'mesa',clientName:'',phone:'',address:'',notes:'',items:[]};
    }
    const table=state.tables.find(t=>t.id===tableId);
    document.getElementById('orderPanelTitle').textContent='Orden - '+table.name;
    openOrderPanel();
}

function openOrderPanel(){
    document.getElementById('orderPanel').classList.add('open');
    renderOrderCategories();
    renderOrderMenuItems();
    renderOrderItems();
}

function closeOrderPanel(){document.getElementById('orderPanel').classList.remove('open');}

function renderOrderCategories(){
    const container=document.getElementById('categoryFilters');
    container.innerHTML='<button class="cat-btn '+(selectedMenuCategory===null?'active':'')+'" onclick="filterMenuCat(null)">Todos</button>';
    state.categories.forEach(c=>{
        container.innerHTML+=`<button class="cat-btn ${selectedMenuCategory===c.name?'active':''}" onclick="filterMenuCat('${c.name}')">${c.name}</button>`;
    });
}

function filterMenuCat(cat){selectedMenuCategory=cat;renderOrderCategories();renderOrderMenuItems();}

function renderOrderMenuItems(){
    const grid=document.getElementById('menuItemsGrid');
    let items=state.menu;
    if(selectedMenuCategory) items=items.filter(m=>m.category===selectedMenuCategory);
    grid.innerHTML='';
    items.forEach(item=>{
        grid.innerHTML+=`<div class="menu-item-btn" onclick="addToOrder(${item.id})"><div class="item-name">${item.name}</div><div class="item-price">$${item.price.toFixed(2)}</div></div>`;
    });
}

function addToOrder(itemId){
    const menuItem=state.menu.find(m=>m.id===itemId);
    if(!menuItem) return;
    const existing=currentOrder.items.find(i=>i.id===itemId);
    if(existing){existing.qty++;}else{currentOrder.items.push({id:itemId,name:menuItem.name,price:menuItem.price,qty:1});}
    renderOrderItems();
}

function changeQty(itemId,delta){
    const item=currentOrder.items.find(i=>i.id===itemId);
    if(!item) return;
    item.qty+=delta;
    if(item.qty<=0) currentOrder.items=currentOrder.items.filter(i=>i.id!==itemId);
    renderOrderItems();
}

function renderOrderItems(){
    const container=document.getElementById('orderItems');
    container.innerHTML='';
    currentOrder.items.forEach(item=>{
        container.innerHTML+=`<div class="order-item"><div class="item-info"><div class="name">${item.name}</div><div class="price">$${item.price.toFixed(2)}</div></div><div class="qty-controls"><button onclick="changeQty(${item.id},-1)">-</button><span>${item.qty}</span><button onclick="changeQty(${item.id},1)">+</button></div></div>`;
    });
    const total=currentOrder.items.reduce((s,i)=>s+i.price*i.qty,0);
    document.getElementById('orderTotal').textContent='$'+total.toFixed(2);
}

function sendOrder(){
    if(currentOrder.items.length===0){alert('Agregue items a la orden');return;}
    if(currentOrder.orderId){
        const order=state.orders.find(o=>o.id===currentOrder.orderId);
        if(order){order.items=currentOrder.items;order.kitchenStatus='pendiente';}
    }else{
        const order={id:Date.now(),type:currentOrder.type,tableId:currentOrder.tableId,clientName:currentOrder.clientName,phone:currentOrder.phone,address:currentOrder.address,notes:currentOrder.notes,items:[...currentOrder.items],status:'activo',kitchenStatus:'pendiente',createdAt:new Date().toISOString()};
        state.orders.push(order);
        wsSend({action:'sync',type:'put',collection:'orders',item:order});
    }
    saveState();renderAll();closeOrderPanel();
}

function cancelOrder(){currentOrder.items=[];renderOrderItems();}

function openChargeModal(){
    if(currentOrder.items.length===0){alert('No hay items para cobrar');return;}
    const modal=document.getElementById('chargeModal');
    const itemsDiv=document.getElementById('chargeItems');
    itemsDiv.innerHTML='';
    currentOrder.items.forEach(item=>{
        itemsDiv.innerHTML+=`<div class="modal-item"><span>${item.name} x${item.qty}</span><span>$${(item.price*item.qty).toFixed(2)}</span></div>`;
    });
    const total=currentOrder.items.reduce((s,i)=>s+i.price*i.qty,0);
    document.getElementById('chargeTotal').textContent='$'+total.toFixed(2);
    selectedPayment='efectivo';
    document.querySelectorAll('.payment-btn').forEach(b=>b.classList.remove('selected'));
    document.querySelector('.payment-btn').classList.add('selected');
    document.getElementById('cashInputSection').classList.add('visible');
    document.getElementById('cashReceived').value='';
    document.getElementById('changeDisplay').style.display='none';
    modal.classList.add('active');
}

function closeChargeModal(){document.getElementById('chargeModal').classList.remove('active');}

function selectPayment(method){
    selectedPayment=method;
    document.querySelectorAll('.payment-btn').forEach(b=>b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    const cashSection=document.getElementById('cashInputSection');
    if(method==='efectivo'){cashSection.classList.add('visible');}else{cashSection.classList.remove('visible');}
}

function calculateChange(){
    const total=currentOrder.items.reduce((s,i)=>s+i.price*i.qty,0);
    const received=parseFloat(document.getElementById('cashReceived').value)||0;
    const change=received-total;
    const display=document.getElementById('changeDisplay');
    if(received>0){display.style.display='block';display.textContent=change>=0?'Cambio: $'+change.toFixed(2):'Falta: $'+Math.abs(change).toFixed(2);display.style.color=change>=0?'var(--success)':'var(--danger)';}else{display.style.display='none';}
}

function confirmCharge(){
    const total=currentOrder.items.reduce((s,i)=>s+i.price*i.qty,0);
    if(selectedPayment==='efectivo'){
        const received=parseFloat(document.getElementById('cashReceived').value)||0;
        if(received<total){alert('Monto insuficiente');return;}
    }
    const sale={id:Date.now(),items:[...currentOrder.items],total:total,paymentMethod:selectedPayment,type:currentOrder.type,createdAt:new Date().toISOString(),date:new Date().toISOString().split('T')[0],detail:currentOrder.type==='mesa'?'Mesa '+(currentOrder.tableId||''):currentOrder.clientName||'Delivery'};
    state.sales.push(sale);
    if(currentOrder.orderId){
        const order=state.orders.find(o=>o.id===currentOrder.orderId);
        if(order) order.status='completado';
    }else{
        const order=state.orders.find(o=>o.tableId===currentOrder.tableId&&o.type==='mesa'&&o.status!=='completado');
        if(order) order.status='completado';
    }
    wsSend({action:'sync',type:'put',collection:'sales',item:sale});
    saveState();renderAll();closeChargeModal();closeOrderPanel();
}

function createDelivery(){
    const client=document.getElementById('delClient').value.trim();
    const phone=document.getElementById('delPhone').value.trim();
    const address=document.getElementById('delAddress').value.trim();
    const notes=document.getElementById('delNotes').value.trim();
    if(!client||!address){alert('Nombre y direcci\u00f3n son requeridos');return;}
    currentOrder={tableId:null,type:'delivery',clientName:client,phone:phone,address:address,notes:notes,items:[]};
    document.getElementById('orderPanelTitle').textContent='Orden Delivery - '+client;
    document.getElementById('delClient').value='';
    document.getElementById('delPhone').value='';
    document.getElementById('delAddress').value='';
    document.getElementById('delNotes').value='';
    openOrderPanel();
}

function renderDelivery(){
    const list=document.getElementById('deliveryList');
    const deliveries=state.orders.filter(o=>o.type==='delivery'&&o.status!=='completado');
    list.innerHTML='';
    deliveries.forEach(d=>{
        const total=d.items.reduce((s,i)=>s+i.price*i.qty,0);
        const statusClass=d.status||'pendiente';
        list.innerHTML+=`<div class="delivery-card ${statusClass}">
            <div class="delivery-header"><h4>${d.clientName||'Sin nombre'}</h4><span class="delivery-status ${statusClass}">${statusClass}</span></div>
            <div class="delivery-info"><i class="fas fa-phone"></i> ${d.phone||'-'} | <i class="fas fa-map-marker-alt"></i> ${d.address||'-'}</div>
            <div class="delivery-info">${d.items.map(i=>i.name+' x'+i.qty).join(', ')} | Total: $${total.toFixed(2)}</div>
            ${d.notes?'<div class="delivery-info"><i class="fas fa-sticky-note"></i> '+d.notes+'</div>':''}
            <div class="delivery-actions">
                ${statusClass==='pendiente'||statusClass==='activo'?'<button style="background:var(--info);color:#fff" onclick="advanceDelivery('+d.id+')">Preparar</button>':''}
                ${statusClass==='preparando'?'<button style="background:var(--secondary);color:var(--primary)" onclick="advanceDelivery('+d.id+')">Enviar</button>':''}
                ${statusClass==='enviado'?'<button style="background:var(--success);color:#fff" onclick="advanceDelivery('+d.id+')">Entregado</button>':''}
                <button style="background:var(--success);color:#fff" onclick="chargeDelivery(${d.id})"><i class="fas fa-dollar-sign"></i> Cobrar</button>
            </div>
        </div>`;
    });
}

function advanceDelivery(id){
    const order=state.orders.find(o=>o.id===id);
    if(!order)return;
    const flow={pendiente:'preparando',activo:'preparando',preparando:'enviado',enviado:'entregado'};
    order.status=flow[order.status]||'entregado';
    if(order.status==='entregado') order.status='completado';
    saveState();renderAll();
    wsSend({action:'sync',type:'put',collection:'orders',item:order});
}

function chargeDelivery(id){
    const order=state.orders.find(o=>o.id===id);
    if(!order)return;
    currentOrder={tableId:null,type:'delivery',clientName:order.clientName,phone:order.phone,address:order.address,notes:order.notes,items:[...order.items],orderId:order.id};
    openChargeModal();
}

function renderKitchen(){
    const grid=document.getElementById('kitchenGrid');
    const kitchenOrders=state.orders.filter(o=>o.kitchenStatus&&o.kitchenStatus!=='entregado'&&o.status!=='completado');
    grid.innerHTML='';
    if(kitchenOrders.length===0){grid.innerHTML='<p style="color:var(--text-muted)">No hay ordenes pendientes en cocina</p>';return;}
    kitchenOrders.forEach(o=>{
        const typeLabel=o.type==='mesa'?'Mesa '+(o.tableId||''):'Delivery - '+(o.clientName||'');
        const ks=o.kitchenStatus||'pendiente';
        grid.innerHTML+=`<div class="kitchen-card ${ks}">
            <div class="kitchen-header"><h4>${typeLabel}</h4><span class="kitchen-type">${ks}</span></div>
            <ul class="kitchen-items">${o.items.map(i=>'<li>'+i.qty+'x '+i.name+'</li>').join('')}</ul>
            <div class="kitchen-actions">
                ${ks==='pendiente'?'<button style="background:var(--info);color:#fff" onclick="advanceKitchen('+o.id+')">Preparar</button>':''}
                ${ks==='preparando'?'<button style="background:var(--success);color:#fff" onclick="advanceKitchen('+o.id+')">Listo</button>':''}
                ${ks==='listo'?'<button style="background:var(--secondary);color:var(--primary)" onclick="advanceKitchen('+o.id+')">Entregado</button>':''}
            </div>
        </div>`;
    });
}

function advanceKitchen(id){
    const order=state.orders.find(o=>o.id===id);
    if(!order)return;
    const flow={pendiente:'preparando',preparando:'listo',listo:'entregado'};
    order.kitchenStatus=flow[order.kitchenStatus]||'entregado';
    saveState();renderAll();
    wsSend({action:'sync',type:'put',collection:'orders',item:order});
}

function renderCaja(){
    const container=document.getElementById('cajaContainer');
    if(!state.cash.open){
        container.innerHTML=`<div class="caja-closed"><h3><i class="fas fa-lock"></i> Caja Cerrada</h3><button onclick="showOpenCajaModal()"><i class="fas fa-lock-open"></i> Abrir Caja</button></div>`;
    }else{
        const salesCount=state.sales.filter(s=>s.createdAt>=state.cash.openedAt).length;
        const totalVendido=state.sales.filter(s=>s.createdAt>=state.cash.openedAt).reduce((sum,s)=>sum+s.total,0);
        const efectivo=state.cash.movements.filter(m=>m.type==='ingreso').reduce((s,m)=>s+m.amount,0)-state.cash.movements.filter(m=>m.type==='egreso').reduce((s,m)=>s+m.amount,0);
        const saldo=state.cash.openingAmount+efectivo;
        const user=JSON.parse(localStorage.getItem('combatti_cafe_user'))||{};
        container.innerHTML=`<div class="caja-open">
            <div class="caja-header"><h3><i class="fas fa-lock-open"></i> Caja Abierta por ${state.cash.openedBy||user.email||''}</h3><button onclick="cerrarCaja()"><i class="fas fa-lock"></i> Cerrar Caja</button></div>
            <div class="caja-info-grid">
                <div class="caja-info-card"><div class="label">Fondo</div><div class="value">$${state.cash.openingAmount.toFixed(2)}</div></div>
                <div class="caja-info-card"><div class="label">Hora Apertura</div><div class="value">${state.cash.openedAt?new Date(state.cash.openedAt).toLocaleTimeString():'-'}</div></div>
                <div class="caja-info-card"><div class="label">Ventas</div><div class="value">${salesCount}</div></div>
                <div class="caja-info-card"><div class="label">Total Vendido</div><div class="value">$${totalVendido.toFixed(2)}</div></div>
                <div class="caja-info-card"><div class="label">Efectivo</div><div class="value">$${efectivo.toFixed(2)}</div></div>
                <div class="caja-info-card"><div class="label">Saldo Estimado</div><div class="value">$${saldo.toFixed(2)}</div></div>
            </div>
            <div class="caja-movements">
                <h4>Movimientos</h4>
                <div class="movement-form">
                    <select id="movType"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select>
                    <input type="number" id="movAmount" placeholder="Monto" step="0.01">
                    <input type="text" id="movDesc" placeholder="Descripci\u00f3n">
                    <button onclick="addMovement()"><i class="fas fa-plus"></i> Registrar</button>
                </div>
                <div class="movements-list">${state.cash.movements.map(m=>'<div class="movement-item '+m.type+'"><span>'+m.description+' - '+(m.date?new Date(m.date).toLocaleTimeString():'')+'</span><span class="movement-amount">'+(m.type==='ingreso'?'+':'-')+'$'+m.amount.toFixed(2)+'</span></div>').join('')}</div>
            </div>
        </div>`;
    }
}

function showOpenCajaModal(){document.getElementById('openCajaModal').classList.add('active');}
function closeCajaModal(){document.getElementById('openCajaModal').classList.remove('active');}

function abrirCaja(){
    const fondo=parseFloat(document.getElementById('cajaFondo').value)||0;
    const turno=document.getElementById('cajaTurno').value;
    const user=JSON.parse(localStorage.getItem('combatti_cafe_user'))||{};
    state.cash.open=true;
    state.cash.openingAmount=fondo;
    state.cash.openedAt=new Date().toISOString();
    state.cash.closedAt=null;
    state.cash.turno=turno;
    state.cash.openedBy=user.email||'';
    state.cash.movements=[];
    saveState();
    wsSend({action:'sync',type:'putConfig',payload:state.cash});
    closeCajaModal();
    renderCaja();
}

function cerrarCaja(){
    if(!confirm('\u00bfCerrar caja?'))return;
    state.cash.open=false;
    state.cash.closedAt=new Date().toISOString();
    state.cash.history.push({openedAt:state.cash.openedAt,closedAt:state.cash.closedAt,openingAmount:state.cash.openingAmount,turno:state.cash.turno,openedBy:state.cash.openedBy,movements:[...state.cash.movements]});
    saveState();
    renderCaja();
}

function addMovement(){
    const type=document.getElementById('movType').value;
    const amount=parseFloat(document.getElementById('movAmount').value)||0;
    const desc=document.getElementById('movDesc').value.trim();
    if(amount<=0){alert('Monto inv\u00e1lido');return;}
    state.cash.movements.push({type:type,amount:amount,description:desc||type,date:new Date().toISOString()});
    saveState();
    document.getElementById('movAmount').value='';
    document.getElementById('movDesc').value='';
    renderCaja();
}

function renderMenu(){
    const catList=document.getElementById('menuCatList');
    catList.innerHTML='';
    state.categories.forEach(c=>{
        catList.innerHTML+=`<div class="menu-cat-item ${selectedManageCategory===c.id?'active':''}" onclick="selectManageCat(${c.id})"><span>${c.name}</span><button class="delete-cat" onclick="deleteCategory(${c.id},event)"><i class="fas fa-trash"></i></button></div>`;
    });
    const prodList=document.getElementById('menuProdList');
    const title=document.getElementById('menuProdTitle');
    if(selectedManageCategory){
        const cat=state.categories.find(c=>c.id===selectedManageCategory);
        title.textContent='Productos - '+(cat?cat.name:'');
        const prods=state.menu.filter(m=>{const c=state.categories.find(ct=>ct.id===selectedManageCategory);return c&&m.category===c.name;});
        prodList.innerHTML='';
        prods.forEach(p=>{
            prodList.innerHTML+=`<div class="product-item"><div class="product-info"><span class="product-name">${p.name}</span><span class="product-price">$${p.price.toFixed(2)}</span></div><button class="delete-prod" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></div>`;
        });
    }else{
        title.textContent='Productos';
        prodList.innerHTML='<p style="color:var(--text-muted)">Seleccione una categor\u00eda</p>';
    }
}

function selectManageCat(id){selectedManageCategory=id;renderMenu();}

function addCategory(){
    const name=document.getElementById('newCatName').value.trim();
    if(!name)return;
    const cat={id:Date.now(),name:name};
    state.categories.push(cat);
    document.getElementById('newCatName').value='';
    saveState();renderMenu();
    wsSend({action:'sync',type:'put',collection:'categories',item:cat});
}

function deleteCategory(id,e){
    e.stopPropagation();
    if(!confirm('\u00bfEliminar categor\u00eda?'))return;
    const cat=state.categories.find(c=>c.id===id);
    if(cat) state.menu=state.menu.filter(m=>m.category!==cat.name);
    state.categories=state.categories.filter(c=>c.id!==id);
    if(selectedManageCategory===id) selectedManageCategory=null;
    saveState();renderMenu();
    wsSend({action:'sync',type:'delete',collection:'categories',docId:id});
}

function addProduct(){
    if(!selectedManageCategory){alert('Seleccione una categor\u00eda');return;}
    const name=document.getElementById('newProdName').value.trim();
    const price=parseFloat(document.getElementById('newProdPrice').value)||0;
    if(!name||price<=0){alert('Complete nombre y precio');return;}
    const cat=state.categories.find(c=>c.id===selectedManageCategory);
    const prod={id:Date.now(),name:name,price:price,category:cat?cat.name:''};
    state.menu.push(prod);
    document.getElementById('newProdName').value='';
    document.getElementById('newProdPrice').value='';
    saveState();renderMenu();
    wsSend({action:'sync',type:'put',collection:'menu',item:prod});
}

function deleteProduct(id){
    if(!confirm('\u00bfEliminar producto?'))return;
    state.menu=state.menu.filter(m=>m.id!==id);
    saveState();renderMenu();
    wsSend({action:'sync',type:'delete',collection:'menu',docId:id});
}

function renderReports(){
    const dateFilter=document.getElementById('reportDate').value;
    let filtered=state.sales;
    if(dateFilter) filtered=filtered.filter(s=>s.date===dateFilter);
    const totalRevenue=filtered.reduce((s,sale)=>s+sale.total,0);
    const orderCount=filtered.length;
    const mesaCount=filtered.filter(s=>s.type==='mesa').length;
    const deliveryCount=filtered.filter(s=>s.type==='delivery').length;
    const avgTicket=orderCount>0?totalRevenue/orderCount:0;
    const cards=document.getElementById('summaryCards');
    cards.innerHTML=`
        <div class="summary-card"><div class="card-value">$${totalRevenue.toFixed(2)}</div><div class="card-label">Ingresos Totales</div></div>
        <div class="summary-card"><div class="card-value">${orderCount}</div><div class="card-label">Ordenes</div></div>
        <div class="summary-card"><div class="card-value">${mesaCount}</div><div class="card-label">Mesas</div></div>
        <div class="summary-card"><div class="card-value">${deliveryCount}</div><div class="card-label">Delivery</div></div>
        <div class="summary-card"><div class="card-value">$${avgTicket.toFixed(2)}</div><div class="card-label">Ticket Promedio</div></div>
    `;
    const tbody=document.getElementById('salesTableBody');
    tbody.innerHTML='';
    filtered.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).forEach(s=>{
        tbody.innerHTML+=`<tr><td>${new Date(s.createdAt).toLocaleTimeString()}</td><td>${s.type}</td><td>${s.detail||'-'}</td><td>${s.paymentMethod}</td><td>$${s.total.toFixed(2)}</td></tr>`;
    });
}

function filterReports(){renderReports();}

document.addEventListener('DOMContentLoaded',function(){
    loadState();
    const session=localStorage.getItem('combatti_cafe_user');
    if(session){
        try{
            const user=JSON.parse(session);
            if(user&&user.email){showApp(user.email);}
        }catch(e){}
    }
});
</script>
