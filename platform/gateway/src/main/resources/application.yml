server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/catalog/**
        - id: orders-service
          uri: ${ORDERS_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
        - id: orders-ws
          uri: ${ORDERS_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/ws/**
        - id: payments-service
          uri: ${PAYMENTS_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
        - id: cash-service
          uri: ${CASH_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/cash/**
        - id: reporting-service
          uri: ${REPORTING_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/reports/**
        - id: settings-service
          uri: ${SETTINGS_SERVICE_URI:http://localhost:8087}
          predicates:
            - Path=/api/settings/**
        - id: integration-service
          uri: ${INTEGRATION_SERVICE_URI:http://localhost:8088}
          predicates:
            - Path=/api/integration/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

combatti:
  jwt:
    # Debe coincidir con el secreto y emisor del auth-service.
    secret: ${JWT_SECRET:dev-secret-change-me-please-change-me-32}
    issuer: ${JWT_ISSUER:combatti-auth}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
