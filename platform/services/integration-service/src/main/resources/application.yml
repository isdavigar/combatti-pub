server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: integration-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/combatti}
    username: ${DB_USER:combatti}
    password: ${DB_PASSWORD:combatti}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: integration
        format_sql: false
  flyway:
    enabled: true
    schemas: integration
    default-schema: integration
    create-schemas: true

combatti:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-change-me-32}
    issuer: ${JWT_ISSUER:combatti-auth}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  catalog:
    base-url: ${CATALOG_SERVICE_URI:http://localhost:8082}
  orders:
    base-url: ${ORDERS_SERVICE_URI:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
