server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/combatti}
    username: ${DB_USER:combatti}
    password: ${DB_PASSWORD:combatti}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: catalog
        format_sql: false
  flyway:
    enabled: true
    schemas: catalog
    default-schema: catalog
    create-schemas: true

combatti:
  jwt:
    # Debe coincidir con el secreto y emisor del auth-service.
    secret: ${JWT_SECRET:dev-secret-change-me-please-change-me-32}
    issuer: ${JWT_ISSUER:combatti-auth}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
